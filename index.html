<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sellora HQ</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  text-align: center;
}

.container {
  padding: 40px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.apply-btn {
  background: gold;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
}

h1 {
  font-size: 45px;
}

span {
  color: gold;
}

.desc {
  max-width: 500px;
  margin: auto;
  color: #ccc;
}

.main-btn {
  margin-top: 20px;
  background: gold;
  border: none;
  padding: 15px 25px;
  border-radius: 25px;
  cursor: pointer;
}

.secondary-btn {
  margin-top: 10px;
  background: transparent;
  border: 1px solid gray;
  padding: 10px 20px;
  border-radius: 20px;
  color: white;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.popup-content {
  background: #111;
  padding: 20px;
  margin: 100px auto;
  width: 300px;
  border-radius: 10px;
}

.popup input {
  width: 90%;
  margin: 8px;
  padding: 10px;
}

.submit-btn {
  background: gold;
  border: none;
  padding: 10px;
}

.close-btn {
  background: red;
  border: none;
  padding: 10px;
}
</style>

</head>

<body>

<div class="container">
  <div class="top-bar">
    <h2>Sellora</h2>
    <button class="apply-btn">Apply</button>
  </div>

  <h1>Monetize your <span>audience</span></h1>

  <p class="desc">
    We build your courses, digital products & brand. You keep 75%.
  </p>

  <button onclick="openForm()" class="main-btn">Book a Meet</button>
  <br>
  <button class="secondary-btn">See how it works</button>
</div>

<!-- POPUP -->
<div id="formPopup" class="popup">
  <div class="popup-content">
    <h2>Book Your Meet</h2>

    <input type="text" placeholder="Your Name">
    <input type="text" placeholder="Channel Name">
    <input type="email" placeholder="Email">
    <input type="number" placeholder="Subscribers">

    <br>
    <button class="submit-btn">Submit</button>
    <button onclick="closeForm()" class="close-btn">Close</button>
  </div>
</div>

<script>
function openForm() {
  document.getElementById("formPopup").style.display = "block";
}

function closeForm() {
  document.getElementById("formPopup").style.display = "none";
}
</script>

</body>
      </html>
