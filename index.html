<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monetize Page</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter', sans-serif;
  color:white;
}

/* HERO */
.hero{
  height:100vh;
  background: url('1000103086.jpg') no-repeat center center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* 🔥 FIX: overlay neeche rakha */
.hero::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:1;
}

/* CONTENT upar */
.content{
  position:relative;
  z-index:2; /* 🔥 important */
  text-align:center;
  max-width:700px;
  padding:20px;
}

/* BADGE */
.badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:20px;
  border:1px solid rgba(255,180,0,0.6);
  color:#ffb300;
  margin-bottom:20px;
}

/* HEADING */
h1{
  font-family:'Playfair Display', serif;
  font-size:60px;
}

.highlight{
  color:#ffb300;
  font-style:italic;
}

/* TEXT */
p{
  margin-top:20px;
  color:#ddd;
  font-size:18px;
}

/* BUTTON */
.btn{
  margin-top:25px;
  padding:15px 35px;
  border-radius:40px;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.primary{
  background:#ffb300;
  color:black;
}

.secondary{
  background:transparent;
  border:1px solid rgba(255,255,255,0.3);
  color:white;
}

</style>
</head>

<body>

<div class="hero">

  <div class="content">

    <div class="badge">Onboarding creators — Q2 2026</div>

    <h1>
      Monetize your <span class="highlight">audience.</span>
    </h1>

    <p>
      We build your courses, digital products & branded theme — end-to-end.
      You keep <span style="color:#ffb300;">75%</span>. We only earn when you do.
    </p>

    <button class="btn primary" onclick="alert('Book a meet clicked')">
      Book a meet →
    </button>
    <br>
    <button class="btn secondary" onclick="alert('See how it works clicked')">
      See how it works
    </button>

  </div>

</div>

</body>
</html>
